<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#1A1A1A" />
    <title>Viraasat — B2B Wholesale Heritage Saree Marketplace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
      /* ── Splash Screen ── */
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #FCFCFC;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                    visibility 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #splash-screen.hide {
        opacity: 0;
        visibility: hidden;
      }
      #splash-logo {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 300;
        font-size: 2rem;
        letter-spacing: 12px;
        text-transform: uppercase;
        color: #1A1A1A;
        animation: splashPulse 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      #splash-logo .splash-accent {
        display: block;
        font-family: 'Montserrat', sans-serif;
        font-size: 0.55rem;
        letter-spacing: 6px;
        color: #C5A059;
        text-align: center;
        margin-top: 0.75rem;
        opacity: 0;
        animation: splashSubFadeIn 1s 0.6s ease forwards;
      }
      @keyframes splashPulse {
        0%   { opacity: 0; transform: scale(0.7); letter-spacing: 6px; }
        50%  { opacity: 1; transform: scale(1.15); letter-spacing: 16px; }
        100% { opacity: 1; transform: scale(1);   letter-spacing: 12px; }
      }
      @keyframes splashSubFadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <!-- Splash Screen (renders instantly, before React) -->
    <div id="splash-screen" aria-hidden="true">
      <div id="splash-logo">
        Viraasat
        <span class="splash-accent">Heritage Handloom</span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
